name: docker-deploy-proxy.yml
on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - '.github/workflows/docker-deploy-proxy.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/solarminer-app/solar-miner-stratum-proxy

jobs:
  build-and-push:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Publish Spring Boot Native Image
        run: |
          chmod +x ./gradlew
          ./gradlew clean
          ./gradlew bootBuildImage \
            --imageName=${{ env.IMAGE_NAME }}:latest-${{ matrix.arch }} \
            --publishImage \
            -x test