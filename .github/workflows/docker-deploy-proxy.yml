name: Release Stratum Proxy Container

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-stratum-proxy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  metadata:
    name: Read release metadata
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.metadata.outputs.version }}
      image: ${{ steps.metadata.outputs.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read and validate release metadata
        id: metadata
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          chmod +x ./gradlew

          VERSION="$(./gradlew -q printVersion)"
          IMAGE="$(./gradlew -q printDockerImage)"
          TAG_VERSION="${TAG_NAME#v}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Gradle version must use x.y.z, got: $VERSION" >&2
            exit 1
          fi

          if [[ "$TAG_VERSION" != "$VERSION" ]]; then
            echo "Git tag and Gradle version do not match:" >&2
            echo "  Git tag:        $TAG_VERSION" >&2
            echo "  Gradle version: $VERSION" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

          echo "Version: $VERSION"
          echo "Image:   $IMAGE"

  test:
    name: Test application
    needs: metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail

          chmod +x ./gradlew
          ./gradlew clean check --no-daemon

  build-and-push:
    name: Build ${{ matrix.arch }} image
    needs:
      - metadata
      - test

    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64

          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and publish native image
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          IMAGE: ${{ needs.metadata.outputs.image }}
        run: |
          set -euo pipefail

          chmod +x ./gradlew

          ./gradlew clean bootBuildImage \
            --imageName="${IMAGE}:${VERSION}-${{ matrix.arch }}" \
            --publishImage \
            -x test \
            --no-daemon

  create-manifest:
    name: Publish multi-architecture image
    needs:
      - metadata
      - build-and-push

    runs-on: ubuntu-latest

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-architecture manifests
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          IMAGE: ${{ needs.metadata.outputs.image }}
        run: |
          set -euo pipefail

          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"

      - name: Inspect published image
        shell: bash
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          IMAGE: ${{ needs.metadata.outputs.image }}
        run: |
          set -euo pipefail

          docker buildx imagetools inspect "${IMAGE}:${VERSION}"